services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_NAME=togglemaster
      - DB_USER=user
      - DB_PASSWORD=
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=toggleadmin
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=togglemaster
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d togglemaster"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
